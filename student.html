          const url = `https://kosis.kr/openapi/Param/statisticsParameterData.do?method=getList&apiKey=${apiKey}&itmId=T10&objL1=${kosisRegion}&objL2=&objL3=&objL4=&objL5=&objL6=&objL7=&objL8=&format=json&jsonVD=Y&prdSe=Y&newPrdDisp=15&orgId=101&tblId=DT_1B8000F`;

          try {
            const res = await fetch(url);
            if (res.ok) {
              const data = await res.json();
              if (Array.isArray(data) && data.length > 0) {
                const formatted = data.map(item => ({
                  yr: item.PRD_DE,
                  rate: parseFloat(item.DTVAL_CO)
                })).sort((a, b) => parseInt(a.yr) - parseInt(b.yr));
                setKosisData(formatted);
                const lastEl = formatted[formatted.length - 1];
                if (lastEl) {
                  setSelectedKosisRate(lastEl.rate);
                  setSelectedKosisYear(lastEl.yr);
                }
              }
            }
          } catch (e) {
            console.log("로컬 안전 백업 데이터를 무중단 표출합니다.");
          } finally {
            setIsKosisLoading(false);
          }
        };

        loadKosis();
      }, [kosisRegion]);

      // 지역 전환 시 값 변환
      const handleRegionSelect = (key) => {
        setSelectedRegion(key);
        setBirthRate(regionData[key].birthRate);
        setDeathRate(regionData[key].deathRate);
        showToast(`${regionData[key].name.split(' (')[0]} 탐구 환경이 로드되었습니다.`, 'info');
      };

      // 시뮬레이터 수치 계산식 연동
      const calculateSimulationResult = () => {
        const result = [];
        let currentPop = initialPopulation;
        const birthFactor = (birthRate - 2.0) * 1.2;
        const deathFactor = (deathRate - 0.7) * -1.0;
        const annualRate = (birthFactor + deathFactor) / 100;

        for (let i = 0; i <= simulationYears; i += 5) {
          result.push({
            label: i === 0 ? '현재' : `${i}년 후`,
            value: Math.max(0, Math.round(currentPop * 10) / 10)
          });
          currentPop = currentPop * Math.pow(1 + annualRate, 5);
        }
        return result;
      };

      const simPoints = calculateSimulationResult();

      // 실시간 피라미드 비율 구조 계산
      const getDynamicPyramidStats = () => {
        const birthDiff = birthRate - regionData[selectedRegion].birthRate;
        const deathDiff = deathRate - regionData[selectedRegion].deathRate;

        let youthDelta = birthDiff * 8;
        let elderlyDelta = deathDiff * -5;
        if (birthRate < 1.0) youthDelta -= 4;

        let youth = Math.max(3, Math.min(50, regionData[selectedRegion].pyramid.youth + youthDelta));
        let elderly = Math.max(2, Math.min(50, regionData[selectedRegion].pyramid.elderly + elderlyDelta));
        let active = 100 - (youth + elderly);

        if (active < 30) {
          active = 30;
          const scale = 70 / (youth + elderly);
          youth = Math.round(youth * scale);
          elderly = Math.round(elderly * scale);
        }

        return {
          elderly: Math.round(elderly),
          active: Math.round(active),
          youth: Math.round(youth)
        };
      };

      const pyramidStats = getDynamicPyramidStats();

      // 합계 출산율에 기초한 추론 결과 도출
      const getDynamicInferenceSummary = () => {
        const activeRatio = pyramidStats.active;
        const dependencyRatio = (((pyramidStats.youth + pyramidStats.elderly) / activeRatio) * 100).toFixed(1);

        if (birthRate < 1.3) {
          return {
            status: '극심한 저출산 및 인구 붕괴',
            style: 'bg-rose-50 border-rose-100 text-rose-800',
            icon: '⚠️',
            summary: `출산율이 극도로 정체되어 향후 청장년층 인구가 유소년 부양 및 노년 보양비에 심각한 재정 압박을 주게 됩니다. (노령 부양률: ${dependencyRatio}%)`
          };
        } else if (birthRate < 2.1) {
          return {
            status: '완만한 감소 진입 구조',
            style: 'bg-amber-50 border-amber-100 text-amber-800',
            icon: 'ℹ️',
            summary: `안정적 대체 출산율(2.1명)에 도달하지 못해 생산인구가 유출되며 미래 성장 잠재력이 점차 하강하는 양상입니다.`
          };
        } else {
          return {
            status: '인구 균형 및 생산 잠재력 활성화',
            style: 'bg-emerald-50 border-emerald-100 text-emerald-800',
            icon: '✅',
            summary: `풍부한 청소년 및 활기찬 청장년이 바탕이 되어 내수 진작과 산업 전반의 고도화를 가져오기 이상적인 조건입니다.`
          };
        }
      };

      const inferenceSummary = getDynamicInferenceSummary();

      // KOSIS 데이터를 시뮬레이터로 안전하게 주입
      const handleApplyKosisRate = () => {
        if (selectedKosisRate !== null) {
          setBirthRate(selectedKosisRate);
          setSelectedRegion('eastAsia');
          showToast(`KOSIS ${selectedKosisYear}년 대한민국 출산율 ${selectedKosisRate}명이 연동 수치로 주입되었습니다!`, 'success');
        }
      };

      // 형성평가 채점
      const handleQuizEvaluate = () => {
        let score = 0;
        quizQuestions.forEach((q) => {
          if (studentAnswers[q.id] === q.correct) score += 33.3;
        });
        const rounded = Math.min(100, Math.round(score));
        setQuizScore(rounded);
        setQuizSubmitted(true);
        showToast(`형성평가 채점이 완료되었습니다. 획득 점수: ${rounded}점`, 'success');
      };

      // Firestore 보고서 전송 처리 (RULE 1, RULE 3 준수)
      const handleReportSubmit = async (e) => {
        e.preventDefault();
        if (!studentId || !studentName) {
          showToast('학번과 이름을 올바르게 채워주세요.', 'warning');
          return;
        }
        if (!firebaseReady || !currentUser) {
          showToast('서버 접속을 대기하는 중입니다. 잠시만 기다려주세요.', 'info');
          return;
        }

        const score = quizSubmitted ? quizScore : evaluateQuizSilent();

        const { db, appId, doc, setDoc } = window.FirebaseGateway;
        // 고유 학번 문서 ID를 사용한 RULE 1 경로 매핑
        const reportDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', studentId.trim());

        const submissionData = {
          studentId: studentId.trim(),
          studentName: studentName.trim(),
          quizScore: score,
          hypothesis: hypothesis || '내용 없음',
          simObservation: simObservation || '내용 없음',
          regionalAnalysis: regionalAnalysis || '내용 없음',
          submittedAt: new Date().toLocaleString(),
          feedback: '',
          feedbackStatus: 'none'
        };

        try {
          await setDoc(reportDocRef, submissionData);
          setIsSubmitted(true);
          showToast('탐구 결과 보고서가 교사 대시보드로 성공적으로 발송되었습니다!', 'success');
        } catch (err) {
          console.error("Firestore 전송 에러: ", err);
          showToast('서버 데이터베이스 보관 실패. 다시 시도해주세요.', 'warning');
        }
      };

      const evaluateQuizSilent = () => {
        let score = 0;
        quizQuestions.forEach((q) => {
          if (studentAnswers[q.id] === q.correct) score += 33.3;
        });
        const rounded = Math.min(100, Math.round(score));
        setQuizScore(rounded);
        setQuizSubmitted(true);
        return rounded;
      };

      // 학생 본인 피드백 실시간 조회
      const handleFeedbackLookup = async (e) => {
        e.preventDefault();
        setHasSearched(true);
        if (!searchId || !searchName) {
          setMyFeedback(null);
          showToast('학번과 이름을 빈칸 없이 입력해주세요.', 'warning');
          return;
        }
        if (!firebaseReady) {
          showToast('데이터베이스 초기화 중입니다.', 'info');
          return;
        }

        const { db, appId, doc, getDoc } = window.FirebaseGateway;
        const reportDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', searchId.trim());

        try {
          const docSnap = await getDoc(reportDocRef);
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.studentName === searchName.trim()) {
              setMyFeedback(data);
              showToast('매칭된 보고서 및 피드백 기록을 발견했습니다.', 'success');
            } else {
              setMyFeedback(null);
              showToast('학번과 성명이 불일치합니다.', 'warning');
            }
          } else {
            setMyFeedback(null);
            showToast('제출된 보고서가 존재하지 않습니다.', 'warning');
          }
        } catch (err) {
          console.error(err);
          showToast('피드백 조회 중 오류가 발생했습니다.', 'warning');
        }
      };

      // 리포트 인쇄 및 PDF 다운로드 기능 정의
      const printReport = () => {
        window.print();
      };

      return (
        <div className="max-w-7xl mx-auto px-6 py-8">
          
          {/* 토스트 경고창 */}
          {toast.message && (
            <div className={`fixed bottom-5 right-6 z-50 px-5 py-3.5 rounded-2xl shadow-xl border flex items-center gap-2 animate-slideIn ${
              toast.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' :
              toast.type === 'warning' ? 'bg-rose-50 border-rose-100 text-rose-800' :
              'bg-sky-50 border-sky-100 text-sky-800'
            }`}>
              <span>🔔</span>
              <span className="text-xs font-bold leading-normal">{toast.message}</span>
            </div>
          )}

          {/* KOSIS OpenAPI 실시간 통계 보드 */}
          <section className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-slate-100 mb-8 animate-fadeIn">
            <div className="flex flex-wrap justify-between items-center mb-6 gap-4">
              <div>
                <h2 className="text-xl font-extrabold text-slate-800 flex items-center gap-2">
                  <span className="text-2xl">📊</span>
                  KOSIS 대한민국 인구동향 합계출산율 실시간 연동
                </h2>
                <p className="text-xs text-slate-400 mt-1">대한민국 통계청 공식 시계열 합계출산율 지표를 로드하여 대조 분석을 준비합니다.</p>
              </div>
              <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                <span className="text-xs font-bold text-slate-500 pl-1">분석 지역:</span>
                <select 
                  value={kosisRegion} 
                  onChange={(e) => setKosisRegion(e.target.value)}
                  className="bg-white text-xs font-bold border border-slate-200 rounded-xl px-3 py-1.5 focus:outline-none"
                >
                  {Object.entries(kosisRegionNames).map(([code, name]) => (
                    <option key={code} value={code}>{name}</option>
                  ))}
                </select>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              <div className="lg:col-span-8 bg-slate-50/50 rounded-2xl p-4 border border-slate-50">
                <span className="text-xs font-bold text-slate-400 block mb-3">연도별 시계열 변동 추이</span>
                
                {/* 인하우스 반응형 SVG 라인 차트 구현 */}
                <div className="h-64 relative flex items-end">
                  {isKosisLoading ? (
                    <div className="absolute inset-0 flex items-center justify-center text-xs text-slate-400 font-bold">통계 데이터 로딩 중...</div>
                  ) : (
                    <svg className="w-full h-full" viewBox="0 0 500 150" preserveAspectRatio="none">
                      {/* 수평 그리드라인 */}
                      <line x1="0" y1="37" x2="500" y2="37" stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="3,3" />
                      <line x1="0" y1="75" x2="500" y2="75" stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="3,3" />
                      <line x1="0" y1="112" x2="500" y2="112" stroke="#e2e8f0" strokeWidth="0.5" strokeDasharray="3,3" />
                      
                      {/* 데이터 라인 매핑 */}
                      {kosisData.length > 1 && (
                        <path
                          d={`M ${kosisData.map((d, i) => {
                            const x = (i / (kosisData.length - 1)) * 500;
                            // 2.0 출산율 기준 좌표 환산
                            const y = 150 - (d.rate / 2.0) * 150;
                            return `${x} ${y}`;
                          }).join(' L ')}`}
                          fill="none"
                          stroke="#f43f5e"
                          strokeWidth="3"
                        />
                      )}
                      
                      {/* 지점 도트 서클 */}
                      {kosisData.map((d, i) => {
                        const x = (i / (kosisData.length - 1)) * 500;
                        const y = 150 - (d.rate / 2.0) * 150;
                        return (
                          <circle
                            key={i}
                            cx={x}
                            cy={y}
                            r="4"
                            fill="#f43f5e"
                            className="hover:r-6 cursor-pointer"
                          />
                        );
                      })}
                    </svg>
                  )}
                </div>
                
                <div className="flex justify-between mt-3 text-[10px] text-slate-400 font-bold font-mono px-1">
                  {kosisData.map((d, i) => <span key={i}>{d.yr}년</span>)}
                </div>
              </div>

              <div className="lg:col-span-4 flex flex-col justify-between">
                <div className="bg-slate-50/50 p-5 rounded-2xl border border-slate-100 space-y-4 h-full flex flex-col justify-center">
                  <div className="text-center">
                    <span className="text-[11px] font-bold text-slate-400">선택 지역 최신 합계출산율</span>
                    <h4 className="text-3xl font-black text-rose-500 mt-1">{selectedKosisRate ? selectedKosisRate.toFixed(2) : '-'} 명</h4>
                    <p className="text-[10px] text-slate-400 mt-1">지자체 단위: {kosisRegionNames[kosisRegion]}</p>
                  </div>

                  {selectedKosisRate && (
                    <button
                      onClick={handleApplyKosisRate}
                      className="w-full bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600 text-white text-xs font-bold py-3 px-4 rounded-xl shadow-sm flex items-center justify-center gap-1"
                    >
                      <span>💡</span> 이 실제 수치를 가상 시뮬레이터에 적용
                    </button>
                  )}
                </div>
              </div>
            </div>
          </section>

          {/* 인구 시뮬레이터 제어부 및 미래 예측 곡선 */}
          <main className="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-8">
            <section className="lg:col-span-4 space-y-6">
              
              <div className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-slate-100">
                <h3 className="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <span>🗺️</span> 1. 아시아 분석 지역
                </h3>
                <div className="space-y-2">
                  {Object.keys(regionData).map((key) => (
                    <button
                      key={key}
                      onClick={() => handleRegionSelect(key)}
                      className={`w-full text-left px-4 py-3.5 rounded-2xl border transition-all ${
                        selectedRegion === key 
                          ? 'border-emerald-300 bg-emerald-50/20 ring-2 ring-emerald-300/10'
                          : 'border-slate-100 hover:bg-slate-50'
                      }`}
                    >
                      <div className="flex justify-between items-center">
                        <span className="text-xs font-bold text-slate-800">{regionData[key].name.split(' (')[0]}</span>
                        {selectedRegion === key && <span className="text-[9px] bg-emerald-100 text-emerald-800 font-extrabold px-2 py-0.5 rounded-full">분석 중</span>}
                      </div>
                      <p className="text-[11px] text-slate-400 mt-1 truncate">{regionData[key].name}</p>
                    </button>
                  ))}
                </div>
              </div>

              <div className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-slate-100">
                <h3 className="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <span>🎛️</span> 2. 인구 요인 동적 제어
                </h3>

                <div className="space-y-6">
                  <div>
                    <div className="flex justify-between items-center mb-1.5">
                      <span className="text-xs font-bold text-slate-500">합계출산율 (TFR)</span>
                      <span className="text-xs font-extrabold text-teal-700 bg-teal-50 px-2 py-0.5 rounded">{birthRate.toFixed(2)} 명</span>
                    </div>
                    <input 
                      type="range" min="0.4" max="5.0" step="0.01" value={birthRate}
                      onChange={(e) => setBirthRate(parseFloat(e.target.value))}
                      className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-teal-400"
                    />
                  </div>

                  <div>
                    <div className="flex justify-between items-center mb-1.5">
                      <span className="text-xs font-bold text-slate-500">사망률 위험 계수</span>
                      <span className="text-xs font-extrabold text-rose-700 bg-rose-50 px-2 py-0.5 rounded">{deathRate.toFixed(2)} %</span>
                    </div>
                    <input 
                      type="range" min="0.2" max="2.5" step="0.05" value={deathRate}
                      onChange={(e) => setDeathRate(parseFloat(e.target.value))}
                      className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-rose-400"
                    />
                  </div>

                  <div className="pt-4 border-t border-slate-50 space-y-3 text-xs">
                    <div className="flex items-center justify-between">
                      <span className="font-bold text-slate-400">초기 기준 인구수:</span>
                      <input 
                        type="number" value={initialPopulation} 
                        onChange={(e) => setInitialPopulation(Math.max(1, parseInt(e.target.value) || 1))}
                        className="w-20 px-2 py-1 text-center font-bold border border-slate-100 rounded bg-slate-50"
                      />
                    </div>
                    <div className="flex gap-1">
                      {[20, 30, 50, 100].map(y => (
                        <button
                          key={y} onClick={() => setSimulationYears(y)}
                          className={`flex-1 py-1 text-[11px] font-bold rounded-lg border transition-all ${
                            simulationYears === y ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 hover:bg-slate-50 border-slate-100'
                          }`}
                        >
                          {y}년
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

            </section>

            {/* 시각 분석 그래프 대시보드 */}
            <section className="lg:col-span-8 space-y-6">
              
              <div className={`p-4 rounded-2xl border transition-all ${inferenceSummary.style}`}>
                <div className="flex items-start gap-2">
                  <span className="text-lg leading-none">{inferenceSummary.icon}</span>
                  <div>
                    <h4 className="text-xs font-bold">{inferenceSummary.status}</h4>
                    <p className="text-[11px] mt-0.5 leading-relaxed font-semibold">{inferenceSummary.summary}</p>
                  </div>
                </div>
              </div>

              <div className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-slate-100">
                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                  <span>📉</span> 3. 동적 추론 모델링 차트
                </h3>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  
                  {/* 동적 인구수 성장 SVG 차트 */}
                  <div>
                    <span className="text-xs font-bold text-slate-400 block mb-3">미래 총 인구 규모 (백만 명)</span>
                    <div className="h-64 bg-slate-50/50 rounded-2xl p-4 border border-slate-50 flex flex-col justify-between">
                      <div className="h-44 relative flex items-end">
                        <svg className="w-full h-full" viewBox="0 0 300 100" preserveAspectRatio="none">
                          {simPoints.length > 1 && (
                            <path
                              d={`M ${simPoints.map((p, i) => {
                                const x = (i / (simPoints.length - 1)) * 300;
                                // 전체 포인트 최대값 기준 좌표 정규화
                                const maxVal = Math.max(...simPoints.map(v => v.value), 10);
                                const y = 100 - (p.value / maxVal) * 100;
                                return `${x} ${y}`;
                              }).join(' L ')}`}
                              fill="none"
                              stroke="#0ea5e9"
                              strokeWidth="3.5"
                            />
                          )}
                          {simPoints.map((p, i) => {
                            const x = (i / (simPoints.length - 1)) * 300;
                            const maxVal = Math.max(...simPoints.map(v => v.value), 10);
                            const y = 100 - (p.value / maxVal) * 100;
                            return <circle key={i} cx={x} cy={y} r="4.5" fill="#0ea5e9" />;
                          })}
                        </svg>
                      </div>
                      <div className="flex justify-between text-[8px] text-slate-400 font-bold font-mono">
                        {simPoints.map((p, i) => <span key={i}>{p.label}</span>)}
                      </div>
                    </div>
                    <span className="text-[10px] text-slate-400 block mt-2 text-center">
                      최종 추정 인구: <strong>{simPoints[simPoints.length - 1].value}</strong> 백만 명
                    </span>
                  </div>

                  {/* 인구 연령 구조 커스텀 게이지 차트 */}
                  <div>
                    <span className="text-xs font-bold text-slate-400 block mb-3">연령대 구조 예측 비중 (%)</span>
                    <div className="h-64 bg-slate-50/50 rounded-2xl p-4 border border-slate-50 flex flex-col justify-around">
                      
                      <div className="space-y-1.5">
                        <div className="flex justify-between text-[11px] font-bold">
                          <span className="text-rose-500">노년층 (65세 이상)</span>
                          <span>{pyramidStats.elderly}%</span>
                        </div>
                        <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                          <div style={{ width: `${pyramidStats.elderly}%` }} className="bg-rose-400 h-full transition-all duration-300" />
                        </div>
                      </div>

                      <div className="space-y-1.5">
                        <div className="flex justify-between text-[11px] font-bold">
                          <span className="text-sky-500">청장년층 (15~64세)</span>
                          <span>{pyramidStats.active}%</span>
                        </div>
                        <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                          <div style={{ width: `${pyramidStats.active}%` }} className="bg-sky-400 h-full transition-all duration-300" />
                        </div>
                      </div>

                      <div className="space-y-1.5">
                        <div className="flex justify-between text-[11px] font-bold">
                          <span className="text-emerald-500">유소년층 (0~14세)</span>
                          <span>{pyramidStats.youth}%</span>
                        </div>
                        <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                          <div style={{ width: `${pyramidStats.youth}%` }} className="bg-emerald-400 h-full transition-all duration-300" />
                        </div>
                      </div>

                    </div>
                  </div>

                </div>
              </div>

            </section>
          </main>

          {/* 형성평가 퀴즈 섹션 */}
          <section className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 mb-8">
            <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
              <span>📝</span> 실습 성취도 형성평가 퀴즈
            </h3>
            
            <div className="space-y-6 mt-4">
              {quizQuestions.map((q) => (
                <div key={q.id} className="p-4 bg-slate-50/50 rounded-2xl border border-slate-100 space-y-3">
                  <div className="flex items-center gap-2">
                    <span className="bg-indigo-100 text-indigo-800 text-[10px] font-bold px-2 py-0.5 rounded">Q{q.id}</span>
                    <h4 className="text-xs font-bold text-slate-800 leading-normal">{q.q}</h4>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-2 pl-4">
                    {q.options.map((opt, oIdx) => {
                      const isSelected = studentAnswers[q.id] === oIdx;
                      return (
                        <button
                          key={oIdx} type="button" disabled={quizSubmitted}
                          onClick={() => setStudentAnswers(prev => ({ ...prev, [q.id]: oIdx }))}
                          className={`text-left text-xs p-2 rounded-xl transition-all border ${
                            isSelected ? 'bg-indigo-50 border-indigo-200 text-indigo-800 font-bold' : 'bg-white border-slate-100 text-slate-600 hover:bg-slate-50'
                          }`}
                        >
                          {oIdx + 1}. {opt}
                        </button>
                      );
                    })}
                  </div>
                  {quizSubmitted && <p className="text-[10px] text-indigo-500 pl-4 font-semibold">💡 해설: {q.hint}</p>}
                </div>
              ))}
            </div>

            <div className="mt-6 flex justify-between items-center bg-indigo-50/10 p-4 rounded-2xl border border-indigo-100/30 flex-wrap gap-2">
              <span className="text-xs text-slate-400">퀴즈를 모두 응시한 뒤 아래에서 채점하고 탐구보고서와 전송하세요.</span>
              {!quizSubmitted ? (
                <button
                  onClick={handleQuizEvaluate}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-2 px-4 rounded-xl transition-all"
                >
                  답안 채점 및 점수 기록
                </button>
              ) : (
                <span className="text-xs font-black text-indigo-700 bg-indigo-100 px-3 py-1 rounded-xl">성적 점수: {quizScore}점</span>
              )}
            </div>
          </section>

          {/* 📝 학생 탐구 결과 보고서 작성 및 Firebase 실시간 전송 공간 */}
          <section className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 mb-8">
            <div className="flex flex-wrap justify-between items-center border-b border-slate-100 pb-5 mb-6 gap-4">
              <div className="flex items-center space-x-3">
                <div className="bg-rose-100/50 p-2 rounded-xl">
                  <FileText className="w-6 h-6 text-rose-500" />
                </div>
                <div>
                  <h3 className="text-xl font-extrabold text-slate-800">지리과 탐구 결과 보고서 작성 대시보드</h3>
                  <p className="text-xs text-slate-400">데이터 변화를 탐색하고 자신의 추론 가설을 실시간 데이터베이스에 누적 전송합니다.</p>
                </div>
              </div>
              <button
                onClick={printReport}
                className="bg-slate-800 hover:bg-slate-900 text-white font-bold text-xs px-5 py-3 rounded-2xl flex items-center gap-1.5 shadow-sm transition-all"
              >
                <span>🖨️</span> PDF 저장 및 인쇄
              </button>
            </div>

            <form onSubmit={handleReportSubmit} className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50/50 p-4 rounded-2xl border border-slate-100/50">
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">학번 (예: 30215)</label>
                  <input 
                    type="text" value={studentId} onChange={(e) => setStudentId(e.target.value)}
                    placeholder="30215" required disabled={isSubmitted}
                    className="w-full px-3 py-2 text-xs border border-slate-200 bg-white rounded-xl focus:ring-2 focus:ring-teal-100 outline-none font-bold"
                  />
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">이름</label>
                  <input 
                    type="text" value={studentName} onChange={(e) => setStudentName(e.target.value)}
                    placeholder="홍길동" required disabled={isSubmitted}
                    className="w-full px-3 py-2 text-xs border border-slate-200 bg-white rounded-xl focus:ring-2 focus:ring-teal-100 outline-none font-bold"
                  />
                </div>
              </div>

              <div>
                <label className="block text-xs font-extrabold text-slate-700 mb-2">1단계. 아시아 및 대한민국 시도별 출산율 구조 대조 결과</label>
                <textarea 
                  rows="3" value={hypothesis} onChange={(e) => setHypothesis(e.target.value)} required disabled={isSubmitted}
                  placeholder="KOSIS 지표와 아시아 가상 출산율 사이의 특징적 수치 격차를 비교 분석해 보세요."
                  className="w-full p-3 text-xs border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-50px outline-none"
                />
              </div>

              <div>
                <label className="block text-xs font-extrabold text-slate-700 mb-2">2단계. 시뮬레이션 수치 변화 및 미래 연령대 충격 관찰</label>
                <textarea 
                  rows="3" value={simObservation} onChange={(e) => setSimObservation(e.target.value)} required disabled={isSubmitted}
                  placeholder="출산율 조정에 따라 인구 피라미드의 노년/유소년 비중이 맞이하는 충격을 기록하세요."
                  className="w-full p-3 text-xs border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-50px outline-none"
                />
              </div>

              <div>
                <label className="block text-xs font-extrabold text-slate-700 mb-2">3단계. 현실적인 인구 변화 대응 발전 대책 기술</label>
                <textarea 
                  rows="3" value={regionalAnalysis} onChange={(e) => setRegionalAnalysis(e.target.value)} required disabled={isSubmitted}
                  placeholder="지속적인 지역 성장을 유도하기 위해 가장 핵심적으로 구축되어야 할 제도는 무엇일까요?"
                  className="w-full p-3 text-xs border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-50px outline-none"
                />
              </div>

              <div className="flex justify-between items-center pt-4 border-t border-slate-100 flex-wrap gap-2">
                <span className="text-[11px] text-slate-400">제출 성공 시, 교사용 실시간 분석 대시보드에 학번 기준 자동 누적됩니다.</span>
                <button
                  type="submit" disabled={isSubmitted}
                  className="bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white font-bold text-xs px-6 py-3 rounded-xl shadow-sm transition-all"
                >
                  {isSubmitted ? '제출 완료' : '탐구보고서 전송'}
                </button>
              </div>
            </form>
          </section>

          {/* 📬 실시간 교사 피드백 확인 수령실 */}
          <section className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 md:p-8 shadow-sm">
            <h3 className="text-xl font-extrabold text-slate-800 mb-2 flex items-center gap-2">
              <span>📬</span> 실시간 교사 및 AI 피드백 수령실
            </h3>
            <p className="text-xs text-slate-400 mb-5">제출 학번과 이름을 검색하여 교사가 발송한 실시간 첨삭 결과를 확인하세요.</p>

            <form onSubmit={handleFeedbackLookup} className="grid grid-cols-1 sm:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100/50 mb-6">
              <div>
                <label className="block text-[10px] font-bold text-slate-500 mb-1">조회할 학번</label>
                <input 
                  type="text" value={searchId} onChange={(e) => setSearchId(e.target.value)}
                  placeholder="30204" required
                  className="w-full px-3 py-2 text-xs border border-slate-200 bg-white rounded-xl focus:outline-none font-bold"
                />
              </div>
              <div>
                <label className="block text-[10px] font-bold text-slate-500 mb-1">조회할 성명</label>
                <input 
                  type="text" value={searchName} onChange={(e) => setSearchName(e.target.value)}
                  placeholder="김민준" required
                  className="w-full px-3 py-2 text-xs border border-slate-200 bg-white rounded-xl focus:outline-none font-bold"
                />
              </div>
              <div className="flex items-end">
                <button 
                  type="submit"
                  className="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2.5 rounded-xl shadow-sm flex items-center justify-center gap-1.5 transition-all"
                >
                  내 피드백 실시간 조회
                </button>
              </div>
            </form>

            {hasSearched && (
              <div className="animate-fadeIn">
                {myFeedback ? (
                  <div className="bg-[#f5f3ff] rounded-2xl p-5 border border-indigo-100 space-y-3">
                    <div className="flex justify-between items-center border-b border-indigo-100/50 pb-2">
                      <span className="text-xs font-bold text-indigo-700 bg-indigo-100 px-2 py-0.5 rounded">평가 피드백 수령</span>
                      <span className="text-[10px] text-slate-400 font-mono">제출일: {myFeedback.submittedAt}</span>
                    </div>
                    <div>
                      <span className="text-[11px] text-slate-400 font-bold block mb-1">담당 교사 & AI 최종 정밀 소견</span>
                      {myFeedback.feedback ? (
                        <p className="bg-white p-4 rounded-xl border border-indigo-200 text-xs text-slate-700 font-semibold leading-relaxed">
                          {myFeedback.feedback}
                        </p>
                      ) : (
                        <p className="bg-amber-50 text-amber-800 p-4 rounded-xl border border-amber-100 text-xs text-center font-bold">
                          ⏳ 현재 보고서 분석 및 검토 대기 중 상태입니다. 잠시 후 새로 조회를 시도해 주세요.
                        </p>
                      )}
                    </div>
                  </div>
                ) : null}
              </div>
            )}
          </section>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
