<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아시아 인구 탐구 교실 - 교사용 대시보드</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone (JSX 컴파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes slideUp {
      from { transform: translateY(1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-slideUp {
      animation: slideUp 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gradient-to-tr from-[#fbf5f3] via-[#f5f2fc] to-[#edf6fc] min-h-screen text-slate-700 antialiased">

  <!-- Firebase 모듈 설정 및 전역 바인딩 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    // 환경 설정 주입 (학생과 동일한 Firestore 연결용 세팅)
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : {
          apiKey: "AIzaSyCTrC7DZPG3JyPlRcW0CZmFrVspZAjsMII",
          authDomain: "ai-3375e.firebaseapp.com",
          projectId: "ai-3375e",
          storageBucket: "ai-3375e.firebasestorage.app",
          messagingSenderId: "513210760471",
          appId: "1:513210760471:web:1d78bc9ebaa2386edf4b52"
        };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'asia-pop-simulator';

    window.FirebaseGateway = {
      auth, db, appId, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
      collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot
    };
  </script>

  <div id="root"></div>

  <!-- 교사용 실시간 분석 및 피드백 전송 어플리케이션 소스 구현 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passwordInput, setPasswordPasswordInput] = useState('');
      const [passwordError, setPasswordError] = useState('');

      // 실시간 동기화되는 학생 보고서 목록
      const [submissions, setSubmissions] = useState([]);
      const [selectedSubmission, setSelectedDetailSubmission] = useState(null);

      // AI 피드백 첨삭 가동 및 편집 텍스트
      const [isAiGenerating, setIsAiGenerating] = useState(false);
      const [editedFeedback, setEditedFeedback] = useState('');

      // 토스트 메시지 알림
      const [toast, setToast] = useState({ message: '', type: 'success' });
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast({ message: '', type: 'success' }), 4000);
      };

      const totalClassCapacity = 25;

      // Firebase 초기 인증 수립 (RULE 3 준수)
      useEffect(() => {
        const checkFirebase = setInterval(() => {
          if (window.FirebaseGateway) {
            clearInterval(checkFirebase);
            const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseGateway;
            
            const performAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) {
                console.error("인증 에러: ", err);
              }
            };

            performAuth();
            onAuthStateChanged(auth, (user) => {
              setCurrentUser(user);
              setFirebaseReady(true);
            });
          }
        }, 150);

        return () => clearInterval(checkFirebase);
      }, []);

      // 인증 성공 시 실시간 Firestore 스냅샷 구독 활성화 (RULE 2, 3 준수)
      useEffect(() => {
        if (!firebaseReady || !currentUser || !isAuthenticated) return;

        const { db, appId, collection, onSnapshot } = window.FirebaseGateway;
        // RULE 1 기반 경로 바인딩
        const submissionsCol = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');

        // 복잡한 orderBy를 피하기 위해 스냅샷 데이터를 가져와 로컬 메모리에서 시간순 역정렬 처리 (RULE 2 준수)
        const unsubscribe = onSnapshot(submissionsCol, (snapshot) => {
          const list = [];
          snapshot.forEach(docSnap => {
            list.push({ id: docSnap.id, ...docSnap.data() });
          });
          
          // 전송일시 기준 역순 정렬
          list.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
          setSubmissions(list);
          showToast(`실시간으로 보고서 ${list.length}건이 로드 및 정렬되었습니다.`, 'success');
        }, (error) => {
          console.error("Firestore loading error: ", error);
          showToast('실시간 데이터 갱신 중 네트워크 지연이 생겼습니다.', 'warning');
        });

        return () => unsubscribe();
      }, [firebaseReady, currentUser, isAuthenticated]);

      // 비밀번호 검증
      const handlePasswordAuth = (e) => {
        e.preventDefault();
        if (passwordInput === '0609') {
          setIsAuthenticated(true);
          showToast('보안 인증에 성공하였습니다. 대시보드로 진입합니다.', 'success');
        } else {
          setPasswordError('비밀번호가 올바르지 않습니다. (비밀번호: 0609)');
        }
      };

      // 개별 모달 오픈 및 임시 텍스트 설정
      const handleOpenModal = (sub) => {
        setSelectedDetailSubmission(sub);
        setEditedFeedback(sub.feedback || '');
      };

      // Gemini AI 기반 훈련 가상 피드백 생성
      const handleGenerateAIFeedback = async (submission) => {
        setIsAiGenerating(true);
        const apiKey = ""; // 런타임 자동 보충 키
        const model = "gemini-2.5-flash-preview-09-2025";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

        const systemPrompt = `당신은 중학교 사회(지리) 교사입니다. 학생이 제출한 '아시아 인구 특징과 지역별 인구 구조 변화' 탐구 보고서를 정밀 평가하고, 존댓말로 따뜻하면서도 구체적인 지리적 피드백을 4문장 내외로 작성해주세요.
        학생의 서술형 답변 내용(Q1~Q3)과 형성평가 퀴즈 점수를 감안하여 학생의 장점을 칭찬하고 개선 방향을 구체적으로 짚어주세요. 결과 텍스트는 줄바꿈 없이 하나의 단락으로만 구성해주세요.`;

        const userQuery = `[학생 정보]
        학번: ${submission.studentId}
        성명: ${submission.studentName}
        형성평가 결과: ${submission.quizScore}점/100점
        
        [서술 답안]
        Q1. 대한민국-아시아 출산율 비교: ${submission.hypothesis}
        Q2. 시뮬레이션 인구 충격 관찰: ${submission.simObservation}
        Q3. 지속발전 가능한 대응 대책: ${submission.regionalAnalysis}`;

        try {
          // Exponential backoff 재시도 루프
          let response;
          let retries = 5;
          let delay = 1000;
          for (let i = 0; i < retries; i++) {
            try {
              response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: userQuery }] }],
                  systemInstruction: { parts: [{ text: systemPrompt }] }
                })
              });
              if (response.ok) break;
            } catch (err) {
              if (i === retries - 1) throw err;
            }
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
          }

          if (!response || !response.ok) throw new Error('API 호출 지연');
          const result = await response.json();
          const feedbackText = result.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (feedbackText) {
            setEditedFeedback(feedbackText.trim());
            showToast('Gemini가 보고서를 해부하여 지리적 첨삭안을 보충했습니다.', 'success');
          } else {
            throw new Error('응답 형식 이상');
          }
        } catch (e) {
          // 오프라인/제한 환경 보완 규칙 기반 로컬 생성
          let fallback = `${submission.studentName} 학생, 시뮬레이터 수치를 연동해 아시아 인구 특징을 심층 분석했습니다. `;
          if (submission.quizScore >= 100) {
            fallback += `형성평가 만점을 보아 유소년 부양 및 인구 보너스 효과의 원리를 명확하게 마스터한 상태입니다. `;
          } else {
            fallback += `형성평가 오답 지점을 검토하여 대체출산율 2.1명 수준의 지리적 기준치를 정밀 수립하면 더욱 성장할 수 있습니다. `;
          }
          fallback += `작성해준 가설과 정책 제안에 나타난 지리적 해결 방향성이 매우 체계적이며 창의적입니다. 탐구에 참여해주어 감사합니다.`;
          
          setEditedFeedback(fallback);
          showToast('시스템 로컬 알고리즘을 사용해 피드백 초안을 산출했습니다.', 'info');
        } finally {
          setIsAiGenerating(false);
        }
      };

      // 작성한 최종 피드백 Firestore 실시간 적용 및 전송 처리
      const handleSendFeedback = async () => {
        if (!editedFeedback.trim()) {
          showToast('피드백 코멘트가 공백 상태입니다.', 'warning');
          return;
        }

        const { db, appId, doc, updateDoc } = window.FirebaseGateway;
        const studentDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', selectedSubmission.studentId);

        try {
          await updateDoc(studentDocRef, {
            feedback: editedFeedback,
            feedbackStatus: 'sent'
          });
          
          // 로컬 상태 즉각 동기화
          setSelectedDetailSubmission(prev => ({
            ...prev,
            feedback: editedFeedback,
            feedbackStatus: 'sent'
          }));

          showToast('피드백 발송 완료! 학생이 본인 화면에서 조회 가능합니다.', 'success');
        } catch (err) {
          console.error("피드백 데이터 전송 오류: ", err);
          showToast('데이터베이스 업데이트 실패. 다시 시도해 주세요.', 'warning');
        }
      };

      // 학생 삭제 처리
      const handleDeleteSubmission = async (id) => {
        if (!confirm("해당 학생의 탐구보고서 데이터를 영구적으로 소멸시키시겠습니까?")) return;

        const { db, appId, doc, deleteDoc } = window.FirebaseGateway;
        const studentDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', id);

        try {
          await deleteDoc(studentDocRef);
          setSelectedDetailSubmission(null);
          showToast('보고서 폐기가 안전하게 완료되었습니다.', 'success');
        } catch (err) {
          console.error(err);
          showToast('기록 파쇄 중 문제가 발생했습니다.', 'warning');
        }
      };

      // CSV 다운로드 (UTF-8 BOM 주입 한글 깨짐 완전 가드)
      const downloadCSV = () => {
        const csvRows = [
          ["순번", "학번", "성명", "형성평가 점수", "1단계_가설수립", "2단계_시뮬레이션관찰", "3단계_지역발전정책", "피드백상태", "최종_피드백_내용", "제출일시"]
        ];

        submissions.forEach((sub, idx) => {
          csvRows.push([
            idx + 1,
            sub.studentId,
            sub.studentName,
            `${sub.quizScore}점`,
            `"${sub.hypothesis.replace(/"/g, '""')}"`,
            `"${sub.simObservation.replace(/"/g, '""')}"`,
            `"${sub.regionalAnalysis.replace(/"/g, '""')}"`,
            sub.feedbackStatus === 'sent' ? '전송완료' : '미피드백',
            `"${(sub.feedback || '').replace(/"/g, '""')}"`,
            sub.submittedAt
          ]);
        });

        const csvContent = "\uFEFF" + csvRows.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `아시아인구탐구_제출및피드백현황_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // 파생 데이터 산출
      const submittedCount = submissions.length;
      const avgQuizScore = submittedCount > 0 
        ? Math.round(submissions.reduce((acc, curr) => acc + curr.quizScore, 0) / submittedCount) 
        : 0;

      // 형성평가 점수 분포 차트 가공
      const getFormativeRangeStats = () => {
        const ranges = { '100점': 0, '66점': 0, '33점': 0, '0점': 0 };
        submissions.forEach(sub => {
          if (sub.quizScore >= 100) ranges['100점']++;
          else if (sub.quizScore >= 66) ranges['66점']++;
          else if (sub.quizScore >= 33) ranges['33점']++;
          else ranges['0점']++;
        });
        return ranges;
      };

      const rangeStats = getFormativeRangeStats();

      // 아직 비밀 패스워드 인증을 완료하지 못한 경우 인증 게이트 호출
      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6 bg-gradient-to-tr from-[#fbf5f3] via-[#f5f2fc] to-[#edf6fc]">
            <div className="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl border border-slate-100 text-center space-y-6">
              <div className="w-16 h-16 bg-[#faf5ff] rounded-2xl flex items-center justify-center mx-auto border border-purple-100 shadow-inner">
                <span className="text-3xl">🔐</span>
              </div>
              <div>
                <h2 className="text-xl font-black text-slate-800">교사 전용 대시보드 보안 관제</h2>
                <p className="text-xs text-slate-400 mt-1">학생들 보고서 검토 및 AI 피드백을 가동하기 위해 4자리 핀 번호를 입력하세요.</p>
              </div>

              <form onSubmit={handlePasswordAuth} className="space-y-4">
                <input 
                  type="password" value={passwordInput} onChange={(e) => setPasswordPasswordInput(e.target.value)}
                  placeholder="핀 비밀번호 입력 (기본: 0609)" required
                  className="w-full text-center px-4 py-3 rounded-2xl border border-slate-200 outline-none text-base font-extrabold focus:ring-2 focus:ring-purple-200"
                />
                {passwordError && <span className="text-[10px] text-rose-500 font-bold block">{passwordError}</span>}
                <button
                  type="submit"
                  className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold text-xs py-3 rounded-2xl transition-all shadow-sm"
                >
                  기록 보드 수령 및 인증
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-7xl mx-auto px-6 py-8 animate-fadeIn">
          
          {/* 토스트 */}
          {toast.message && (
            <div className={`fixed bottom-5 right-6 z-50 px-5 py-3.5 rounded-2xl shadow-xl border flex items-center gap-2 animate-slideIn ${
              toast.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' : 'bg-rose-50 border-rose-100 text-rose-800'
            }`}>
              <span>🔔</span>
              <span className="text-xs font-bold">{toast.message}</span>
            </div>
          )}

          {/* 대시보드 종합 지표 */}
          <section className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-slate-100 mb-8">
            <div className="flex flex-wrap justify-between items-center border-b border-slate-100 pb-5 mb-6 gap-4">
              <div>
                <h1 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                  <span className="text-3xl">💻</span>
                  실시간 사회과 형성평가 및 보고서 관제 대시보드
                </h1>
                <p className="text-xs text-slate-400 mt-1">실시간 데이터베이스(Firestore)를 동적 감시하여 학생들의 제출 결과와 평균 성취도를 취합합니다.</p>
              </div>
              <button
                onClick={downloadCSV}
                className="bg-teal-600 hover:bg-teal-700 text-white font-bold text-xs px-5 py-3 rounded-2xl shadow-sm transition-all flex items-center gap-1.5"
              >
                <span>📥</span> 실시간 제출현황 Excel CSV 다운로드
              </button>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
              <div className="bg-sky-50/50 p-5 rounded-2xl border border-sky-100/50 flex flex-col justify-between">
                <span className="text-xs font-bold text-slate-500">실시간 누적 제출 현황</span>
                <div className="flex items-baseline gap-1 mt-2">
                  <span className="text-4xl font-black text-sky-800">{submittedCount}</span>
                  <span className="text-xs font-bold text-slate-400">/ {totalClassCapacity} 명 정원</span>
                </div>
                <div className="w-full bg-slate-200/50 h-2.5 rounded-full mt-3 overflow-hidden">
                  <div className="bg-sky-500 h-full transition-all duration-300" style={{ width: `${Math.min(100, (submittedCount / totalClassCapacity) * 100)}%` }} />
                </div>
              </div>

              <div className="bg-rose-50/50 p-5 rounded-2xl border border-rose-100/50 flex flex-col justify-between">
                <span className="text-xs font-bold text-slate-500">형성평가 평균 점수</span>
                <div className="flex items-baseline gap-1 mt-2">
                  <span className="text-4xl font-black text-rose-800">{avgQuizScore}</span>
                  <span className="text-xs font-bold text-slate-400">점 / 100점 만점</span>
                </div>
                <p className="text-[10px] text-slate-400 mt-3 font-semibold">전체 학생 기준 종합적 퀴즈 도달률입니다.</p>
              </div>

              <div className="bg-emerald-50/50 p-5 rounded-2xl border border-emerald-100/50 flex flex-col justify-between">
                <span className="text-xs font-bold text-slate-500">대기 중인 학급 수치</span>
                <div className="flex items-baseline gap-1 mt-2">
                  <span className="text-4xl font-black text-emerald-800">{Math.max(0, totalClassCapacity - submittedCount)}</span>
                  <span className="text-xs font-bold text-slate-400">명 미제출</span>
                </div>
                <p className="text-[10px] text-slate-400 mt-3 font-semibold">원활한 피드백을 위해 제출 독려가 필요할 수 있습니다.</p>
              </div>
            </div>

            {/* 간단 SVG 기반 성적 분포 */}
            <div className="p-4 bg-slate-50/50 rounded-2xl border border-slate-100">
              <span className="text-xs font-bold text-slate-400 block mb-4">점수대별 제출 분포도</span>
              <div className="grid grid-cols-4 gap-4">
                {Object.entries(rangeStats).map(([key, val]) => (
                  <div key={key} className="bg-white p-3 rounded-xl border border-slate-100/80 text-center">
                    <span className="text-[10px] font-bold text-slate-400">{key}</span>
                    <h5 className="text-base font-black text-slate-800 mt-1">{val}명</h5>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* 누적 기록 테이블 */}
          <section className="bg-white/95 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
              <span>📋</span> 학생 제출 정량·정성 현황 테이블
            </h3>

            <div className="overflow-x-auto rounded-2xl border border-slate-100">
              <table className="w-full text-left text-xs">
                <thead className="bg-slate-50 text-slate-500 font-bold border-b border-slate-100">
                  <tr>
                    <th className="px-4 py-3.5 text-center">번호</th>
                    <th className="px-4 py-3.5">학번</th>
                    <th className="px-4 py-3.5">이름</th>
                    <th className="px-4 py-3.5 text-center">형성평가</th>
                    <th className="px-4 py-3.5">가설 내용</th>
                    <th className="px-4 py-3.5 text-center">피드백 전송상태</th>
                    <th className="px-4 py-3.5 text-center">피드백 제어</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100 bg-white font-medium">
                  {submissions.map((sub, idx) => (
                    <tr key={sub.id} className="hover:bg-slate-50/60 transition-all">
                      <td className="px-4 py-3.5 text-center text-slate-400 font-bold">{idx + 1}</td>
                      <td className="px-4 py-3.5 font-bold text-slate-800">{sub.studentId}</td>
                      <td className="px-4 py-3.5 font-bold text-slate-700">{sub.studentName}</td>
                      <td className="px-4 py-3.5 text-center">
                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${sub.quizScore >= 100 ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}`}>
                          {sub.quizScore}점
                        </span>
                      </td>
                      <td className="px-4 py-3.5 truncate max-w-xs text-slate-400">{sub.hypothesis}</td>
                      <td className="px-4 py-3.5 text-center">
                        <span className={`px-2.5 py-0.5 rounded text-[10px] font-bold ${sub.feedbackStatus === 'sent' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}`}>
                          {sub.feedbackStatus === 'sent' ? '전송 완료' : '미피드백'}
                        </span>
                      </td>
                      <td className="px-4 py-3.5 text-center">
                        <button
                          onClick={() => handleOpenModal(sub)}
                          className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold text-[10px] px-3.5 py-1.5 rounded-xl transition-all"
                        >
                          피드백 제어
                        </button>
                      </td>
                    </tr>
                  ))}
                  {submissions.length === 0 && (
                    <tr>
                      <td colSpan="7" className="px-4 py-12 text-center text-slate-400 font-bold">현재 제출된 탐구 결과 보고서가 존재하지 않습니다.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </section>

          {/* AI 첨삭 및 교사 최종 검토 모달 */}
          {selectedSubmission && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex justify-center items-center p-4 z-50 animate-fadeIn">
              <div className="bg-white rounded-3xl max-w-2xl w-full p-6 shadow-2xl border border-slate-100 space-y-5 max-h-[85vh] overflow-y-auto animate-slideUp">
                <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                  <div>
                    <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold">교사 개별 평가 및 AI 전송</span>
                    <h3 className="text-lg font-black text-slate-800 mt-1">{selectedSubmission.studentId} {selectedSubmission.studentName} 학생</h3>
                  </div>
                  <button onClick={() => setSelectedDetailSubmission(null)} className="text-slate-400 hover:text-slate-600 text-2xl font-bold">×</button>
                </div>

                <div className="space-y-4 text-xs font-semibold">
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex justify-between">
                    <span>형성평가 점수:</span>
                    <span className="font-extrabold text-indigo-600">{selectedSubmission.quizScore} 점</span>
                  </div>

                  <div className="space-y-1">
                    <span className="text-slate-400 block">Q1. 합계출산율 구조 대조 가설</span>
                    <p className="bg-slate-50/50 p-3 rounded-xl border border-slate-100">{selectedSubmission.hypothesis}</p>
                  </div>

                  <div className="space-y-1">
                    <span className="text-slate-400 block">Q2. 시뮬레이션 충격 관찰 내용</span>
                    <p className="bg-slate-50/50 p-3 rounded-xl border border-slate-100">{selectedSubmission.simObservation}</p>
                  </div>

                  <div className="space-y-1">
                    <span className="text-slate-400 block">Q3. 대응 정책 제언</span>
                    <p className="bg-slate-50/50 p-3 rounded-xl border border-slate-100">{selectedSubmission.regionalAnalysis}</p>
                  </div>

                  <div className="pt-4 border-t border-slate-100 space-y-3">
                    <div className="flex justify-between items-center">
                      <span className="text-xs font-bold text-indigo-700 flex items-center gap-1">🤖 Gemini 2.5 AI 실시간 가상 첨삭 피드백</span>
                      <button
                        onClick={() => handleGenerateAIFeedback(selectedSubmission)}
                        disabled={isAiGenerating}
                        className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white font-bold text-[10px] px-3 py-1.5 rounded-lg transition-all"
                      >
                        {isAiGenerating ? 'AI가 분석하는 중...' : 'AI 피드백 생성'}
                      </button>
                    </div>
                    <textarea
                      rows="4" value={editedFeedback} onChange={(e) => setEditedFeedback(e.target.value)}
                      placeholder="AI가 생성한 초안을 토대로 내용을 수정하거나 보충하여 학생 수령실로 안전 발송할 수 있습니다."
                      className="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-100 font-medium text-slate-600"
                    />
                  </div>
                </div>

                <div className="pt-3 border-t border-slate-100 flex justify-between items-center">
                  <button
                    onClick={() => handleDeleteSubmission(selectedSubmission.id)}
                    className="text-xs text-rose-500 hover:text-rose-700 font-bold px-3 py-2 hover:bg-rose-50 rounded-xl transition-all"
                  >
                    데이터 파쇄
                  </button>
                  <div className="flex gap-2">
                    <button
                      onClick={() => setSelectedDetailSubmission(null)}
                      className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs px-5 py-2.5 rounded-xl transition-all"
                    >
                      취소
                    </button>
                    <button
                      onClick={handleSendFeedback}
                      className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-5 py-2.5 rounded-xl transition-all shadow-sm"
                    >
                      최종 검토 피드백 발송
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
